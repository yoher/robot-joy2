# BNO080 IMU Configuration
imu:
  ros__parameters:
    # I2C Configuration
    i2c_bus: 1                    # I2C bus number (1 for Raspberry Pi)
    i2c_address: 0x4B             # BNO080 I2C address (0x4A or 0x4B)
    
    # Sensor Mode Configuration
    # Options: "game_rv" (6-axis, no magnetometer), "rotation_vector" (9-axis with mag)
    sensor_mode: "game_rv"
    
    # Update Rate
    update_rate_hz: 30.0          # Sensor update rate (10-400Hz for RV, up to 1000Hz for gyro_rv)
    
    # Calibration Configuration
    calibration:
      auto_calibrate: true        # Enable automatic dynamic calibration
      accel_calibration: true     # Calibrate accelerometer (remove zero-g offset)
      gyro_calibration: true      # Calibrate gyroscope (remove zero-rate offset)
      mag_calibration: true       # Calibrate magnetometer (only for rotation_vector mode)
      save_calibration: false     # Save calibration to flash (not yet implemented)
    
    # Frame Configuration
    frame_id: "imu_link"          # TF frame ID for IMU data
    use_magnetic_north: false     # true for rotation_vector, false for game_rv
    
    # Publishing Configuration
    publish_raw_data: false       # Publish raw sensor data (accel, gyro) in addition to fused
    publish_gravity: false        # Publish separate gravity vector
    publish_mag: false            # Publish magnetometer data (only for rotation_vector mode)
    
    # Advanced Settings
    timeout_ms: 100               # Read timeout in milliseconds
    debug: true                  # Enable debug logging
    
    # Covariance Matrices
    # These are default values and will be updated based on calibration accuracy
    # Format: [xx, xy, xz, yx, yy, yz, zx, zy, zz] (row-major order)
    
    # Orientation covariance (rad²)
    orientation_covariance: [0.01, 0.0, 0.0,
                             0.0, 0.01, 0.0,
                             0.0, 0.0, 0.01]
    
    # Angular velocity covariance ((rad/s)²)
    angular_velocity_covariance: [0.001, 0.0, 0.0,
                                  0.0, 0.001, 0.0,
                                  0.0, 0.0, 0.001]
    
    # Linear acceleration covariance ((m/s²)²)
    linear_acceleration_covariance: [0.01, 0.0, 0.0,
                                     0.0, 0.01, 0.0,
                                     0.0, 0.0, 0.01]
    
    # Accuracy-based covariance scaling
    # Covariance values will be scaled based on BNO080 accuracy status
    # accuracy_status: 0=unreliable, 1=low, 2=medium, 3=high
    covariance_scale:
      unreliable: 10.0            # Multiply covariance by this factor for unreliable data
      low: 5.0                    # Low accuracy
      medium: 2.0                 # Medium accuracy
      high: 1.0                   # High accuracy (use base covariance)