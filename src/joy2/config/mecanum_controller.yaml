controller_manager:
  ros__parameters:
    update_rate: 100

    mecanum_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_controller:
  ros__parameters:
    left_front_wheel_names: ["wheel_front_left_joint"]
    right_front_wheel_names: ["wheel_front_right_joint"]
    left_rear_wheel_names: ["wheel_rear_left_joint"]
    right_rear_wheel_names: ["wheel_rear_right_joint"]

    wheel_radius: 0.05
    wheel_separation_width: 0.34
    wheel_separation_length: 0.30

    enable_odom_tf: true
    publish_rate: 50
    use_stamped_vel: false

    cmd_vel_timeout: 0.5
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0
      y:
        has_velocity_limits: true
        max_velocity: 1.0
    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.0

    joint_state_interface_name: joint_states
    command_interface_type: velocity
    use_mecanum_model: true

    kinematic_parameter_source: parameter
    steer_centered: false

pid_gains:
  wheel_front_left_joint:
    p: 10.0
    i: 0.0
    d: 0.1
    i_clamp: 1.0
  wheel_front_right_joint:
    p: 10.0
    i: 0.0
    d: 0.1
    i_clamp: 1.0
  wheel_rear_left_joint:
    p: 10.0
    i: 0.0
    d: 0.1
    i_clamp: 1.0
  wheel_rear_right_joint:
    p: 10.0
    i: 0.0
    d: 0.1
    i_clamp: 1.0