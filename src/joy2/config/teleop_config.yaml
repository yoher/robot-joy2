# Teleop control configuration
teleop:
  ros__parameters:
    # Modifier key settings
    alt_button_index: 7  # R1 button (button 7 on standard gamepad)
    alt_button_name: "R1"

    # Joystick axes configuration
    left_joystick:
      x_axis: 0  # Left joystick X axis
      y_axis: 1  # Left joystick Y axis

    right_joystick:
      x_axis: 2  # Right joystick X axis
      y_axis: 3  # Right joystick Y axis

    # Servo control mappings (only active when alt_button is pressed)
    servo_controls:
      # Left joystick controls (when Alt is pressed)
      left_x_servo: "c1"  # Left X → continuous servo c1 (channel 8)
      left_y_servo: "c2"  # Left Y → continuous servo c2 (channel 9)

      # Right joystick controls (when Alt is pressed)
      right_x_servo: "p1"  # Right X → positional servo p1 (channel 10)
      right_y_servo: "p2"  # Right Y → positional servo p2 (channel 11)

    # Wheel control mappings (when Alt is NOT pressed)
    wheel_deadzone: 0.05    # Deadzone for wheel control

    # Control sensitivity settings
    deadzone: 0.05        # Minimum joystick movement to trigger servo command
    angle_range:
      min: 0.0           # Minimum angle for joystick conversion
      max: 180.0         # Maximum angle for joystick conversion

    # Buzzer settings
    buzzer_button_index: 1  # B button (button 1)
    buzzer_frequency: 1000  # Hz
    buzzer_duration: 500    # ms

    # Wheel control settings (when Alt is not pressed)
    wheel_control:
      translation_scale: 0.3  # Scale factor for translation movements
      rotation_scale: 0.3     # Scale factor for rotation
      wheel_deadzone: 0.05    # Deadzone for wheel control